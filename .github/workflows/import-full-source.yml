name: import-full-source

on:
  push:
    branches:
      - phase1-mobile-compat
    paths:
      - .github/workflows/import-full-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout custom repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import full upstream source and apply phase 1 fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/synctv-org/synctv.git
          git fetch upstream main --tags
          git fetch origin main
          git checkout -B full-source-phase1 origin/main

          # Connect upstream history to our repository while keeping main as an ancestor.
          git merge --allow-unrelated-histories -s ours --no-edit upstream/main \
            -m "chore: connect synctv upstream history"

          # Replace the working tree with the official SyncTV source snapshot.
          git rm -r --ignore-unmatch .
          git checkout upstream/main -- .
          git submodule sync --recursive
          git submodule update --init --recursive

          MAIN_SHA="$(git rev-parse upstream/main)"
          VENDORS_SHA="$(git -C vendors rev-parse HEAD)"
          WEB_SHA="$(git -C synctv-web rev-parse HEAD)"

          # Flatten submodules so every component can be edited in this repository.
          git rm -f --cached vendors synctv-web
          rm -rf vendors/.git synctv-web/.git
          rm -f .gitmodules
          git add -A
          git commit -m "chore: import full SyncTV source with flattened submodules"

          # Phase 1: conservative browser-compatible Emby profile.
          python3 <<'PY'
          from pathlib import Path

          path = Path("vendors/vendors/emby/user.go")
          text = path.read_text(encoding="utf-8")
          replacements = [
              ('VideoCodec: "h264,hevc,vp9,av1"', 'VideoCodec: "h264"'),
              ('AudioCodec: "aac,mp3,mp2,opus,flac,vorbis"', 'AudioCodec: "aac,mp3"'),
              ('VideoCodec: "av1,hevc,h264,vp9"', 'VideoCodec: "h264"'),
              ('AudioCodec: "aac,mp2,opus,flac"', 'AudioCodec: "aac"'),
              ('VideoCodec:          "hevc,h264,vp9"', 'VideoCodec:          "h264"'),
              ('AudioCodec:          "aac,mp2,opus,flac"', 'AudioCodec:          "aac"'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"Expected source fragment not found: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY

          # Do not run the upstream multi-platform release matrix automatically.
          mkdir -p .github/upstream-workflows
          if [ -f .github/workflows/release.yml ]; then
            mv .github/workflows/release.yml .github/upstream-workflows/release.yml.disabled
          fi

          cat > UPSTREAM.md <<EOF
          # Upstream snapshot

          This repository contains a flattened snapshot of SyncTV so that the backend,
          vendors and web UI can be modified together.

          - synctv: https://github.com/synctv-org/synctv/commit/${MAIN_SHA}
          - vendors: https://github.com/synctv-org/vendors/commit/${VENDORS_SHA}
          - synctv-web: https://github.com/synctv-org/synctv-web/commit/${WEB_SHA}

          Imported automatically by GitHub Actions. The original licenses are retained.
          EOF

          cat > CUSTOM_CHANGES.md <<'EOF'
          # Custom changes

          ## Phase 1: mobile Emby playback compatibility

          SyncTV previously advertised MP4 + HEVC/VP9/AV1 as universally direct-playable.
          That caused Emby to return `original.mp4` to mobile browsers even when the
          browser could not decode the stream. The custom profile now:

          - Direct-plays only H.264 MP4/M4V with AAC/MP3.
          - Requests H.264 + AAC HLS for incompatible or uncertain video formats.
          - Keeps SyncTV rooms, synchronization, chat, Bilibili and other vendors intact.

          ## Planned phase 2

          - Per-user quality selection.
          - Per-user audio-track selection.
          - Per-user subtitle selection.
          - Correct Emby playback-session and progress reporting.
          EOF

          mkdir -p deploy
          cat > deploy/docker-compose.synology.yml <<'EOF'
          services:
            synctv:
              image: ghcr.io/navimikew/synctv-fix:full-source-phase1
              container_name: synctv-fix
              restart: unless-stopped
              ports:
                - "8080:8080/tcp"
                - "8080:8080/udp"
              volumes:
                - /volume1/docker/synctv:/root/.synctv
              environment:
                PUID: "0"
                PGID: "0"
                UMASK: "022"
                TZ: Asia/Shanghai
          EOF

          cat > .github/workflows/build-custom.yml <<'EOF'
          name: build-custom-image

          on:
            push:
              branches: [main, full-source-phase1]
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read
            packages: write

          jobs:
            docker:
              runs-on: ubuntu-24.04
              steps:
                - uses: actions/checkout@v4
                - uses: docker/setup-buildx-action@v3
                - name: Login to GHCR
                  if: github.event_name != 'pull_request'
                  uses: docker/login-action@v3
                  with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
                - name: Build and optionally push
                  uses: docker/build-push-action@v6
                  with:
                    context: .
                    platforms: linux/amd64
                    push: ${{ github.event_name != 'pull_request' }}
                    tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
          EOF

          git add -A
          git commit -m "fix: use mobile-compatible Emby playback profile"
          git push origin HEAD:full-source-phase1 --force
