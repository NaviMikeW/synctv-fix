name: import-full-source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout custom repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare branch and connect upstream history
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove upstream || true
          git remote add upstream https://github.com/synctv-org/synctv.git
          git fetch upstream main --tags
          git fetch origin main
          git checkout -B full-source-phase1 origin/main
          git merge --allow-unrelated-histories -s ours --no-edit -m "chore: connect SyncTV upstream history" upstream/main

      - name: Check out official source and submodules
        shell: bash
        run: |
          set -euxo pipefail
          git rm -r --ignore-unmatch .
          git checkout upstream/main -- .
          git submodule sync --recursive
          git submodule update --init --recursive
          echo "MAIN_SHA=$(git rev-parse upstream/main)" >> "$GITHUB_ENV"
          echo "VENDORS_SHA=$(git -C vendors rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "WEB_SHA=$(git -C synctv-web rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Flatten vendors and web submodules
        shell: bash
        run: |
          set -euxo pipefail
          git rm -f --cached vendors synctv-web
          rm -rf vendors/.git synctv-web/.git
          rm -f .gitmodules
          git add -A
          git commit -m "chore: import full SyncTV source with flattened submodules"

      - name: Apply mobile Emby compatibility fix
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path("vendors/vendors/emby/user.go")
          text = path.read_text(encoding="utf-8")
          replacements = [
              ('VideoCodec: "h264,hevc,vp9,av1"', 'VideoCodec: "h264"'),
              ('AudioCodec: "aac,mp3,mp2,opus,flac,vorbis"', 'AudioCodec: "aac,mp3"'),
              ('VideoCodec: "av1,hevc,h264,vp9"', 'VideoCodec: "h264"'),
              ('AudioCodec: "aac,mp2,opus,flac"', 'AudioCodec: "aac"'),
              ('VideoCodec:          "hevc,h264,vp9"', 'VideoCodec:          "h264"'),
              ('AudioCodec:          "aac,mp2,opus,flac"', 'AudioCodec:          "aac"'),
          ]
          for old, new in replacements:
              count = text.count(old)
              print(f"replace {old!r}: found {count}")
              if count < 1:
                  raise SystemExit(f"Expected source fragment not found: {old}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY
          gofmt -w vendors/vendors/emby/user.go

      - name: Add custom documentation
        shell: bash
        run: |
          set -euxo pipefail

          # The workflow token used by this import cannot safely add new workflow files.
          # Preserve upstream workflows as documentation and add our build workflow later.
          if [ -d .github/workflows ]; then
            mkdir -p .github/upstream-workflows
            for file in .github/workflows/*; do
              [ -e "$file" ] || continue
              mv "$file" ".github/upstream-workflows/$(basename "$file").disabled"
            done
            rmdir .github/workflows || true
          fi

          cat > UPSTREAM.md <<EOF
          # Upstream snapshot

          Complete flattened SyncTV source snapshot:

          - synctv: https://github.com/synctv-org/synctv/commit/${MAIN_SHA}
          - vendors: https://github.com/synctv-org/vendors/commit/${VENDORS_SHA}
          - synctv-web: https://github.com/synctv-org/synctv-web/commit/${WEB_SHA}

          The original licenses are retained.
          EOF

          cat > CUSTOM_CHANGES.md <<'EOF'
          # Custom changes

          ## Phase 1: mobile Emby playback compatibility

          - MP4/M4V direct play is limited to H.264 with AAC/MP3.
          - Other or uncertain video codecs request H.264 + AAC HLS from Emby.
          - Sync, chat, Bilibili and other existing features remain intact.

          ## Planned phase 2

          - Per-user quality, audio and subtitle selection.
          - Emby playback-session and progress reporting.
          EOF

          mkdir -p deploy
          cat > deploy/docker-compose.synology.yml <<'EOF'
          services:
            synctv:
              image: ghcr.io/navimikew/synctv-fix:full-source-phase1
              container_name: synctv-fix
              restart: unless-stopped
              ports:
                - "8080:8080/tcp"
                - "8080:8080/udp"
              volumes:
                - /volume1/docker/synctv:/root/.synctv
              environment:
                PUID: "0"
                PGID: "0"
                UMASK: "022"
                TZ: Asia/Shanghai
          EOF

          git add -A
          git commit -m "fix: use mobile-compatible Emby playback profile"

      - name: Push full source branch
        shell: bash
        run: |
          set -euxo pipefail
          git push origin HEAD:full-source-phase1 --force
