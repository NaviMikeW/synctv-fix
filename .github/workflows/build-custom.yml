name: build-and-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-main
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=v0.9.15
          tags: |
            ghcr.io/navimikew/synctv-fix:latest
            ghcr.io/navimikew/synctv-fix:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/NaviMikeW/synctv-fix
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v0.9.15-fix.${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
